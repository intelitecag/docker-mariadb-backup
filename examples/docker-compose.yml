version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: mariadb
    restart: unless-stopped
    environment:
      # MariaDB Root Passwort fuer das Beispiel
      MARIADB_ROOT_PASSWORD: supersecret
      # Root darf sich fuer dieses Beispiel von jedem Host anmelden
      MARIADB_ROOT_HOST: "%"
      MARIADB_DATABASE: appdb
      TZ: Europe/Zurich
    volumes:
      # Persistente Datenbankdaten auf dem Host
      - ./data:/var/lib/mysql
    networks:
      - backup-net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mariadb-backup:
    image: ghcr.io/intelitecag/docker-mariadb-backup:latest
    container_name: mariadb-backup
    restart: unless-stopped
    environment:
      # Verbindung zur MariaDB Instanz im gleichen Netzwerk
      MARIADB_HOST: mariadb
      MARIADB_PORT: "3306"
      MARIADB_USER: root
      MARIADB_PASSWORD: supersecret
      BACKUP_PREFIX: mariadb-prod
      RETENTION_DAILY: "7"
      RETENTION_WEEKLY: "4"
      RETENTION_MONTHLY: "6"
      TZ: Europe/Zurich
    volumes:
      # Backup Verzeichnis auf dem Host fuer SQL Dumps und Logs
      - ./backup:/backup
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - backup-net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'crond -f' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  backup-net:
    driver: bridge
